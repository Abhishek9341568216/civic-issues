<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reported Issues Map</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <!-- Bootstrap CSS  -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
     <!-- Leaflet CSS  -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <style>
        #map { height: 600px; width: 100%; margin-top: 20px; }
    </style>
</head>
<body class="container mt-4">

    <h2 class="text-center mb-3">Reported Civic Issues Map</h2>
    <p class="text-center">Click on markers to see issue details</p>

     <!-- Map Container -->
    <div id="map"></div>

     <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        // Initialize map (Default view over India)
        var map = L.map('map').setView([20.5937, 78.9629], 5);

        // Add OpenStreetMap tile layer
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        // Pass Flask reports variable to JS
        var reports = JSON.parse('{{ reports|tojson|safe }}');

        // Add markers for each report
        reports.forEach(function(report) {
            if (report.latitude && report.longitude) {
                var marker = L.marker([report.latitude, report.longitude]).addTo(map);
                var popupContent = "<b>" + report.title + "</b><br>" +
                                   report.description + "<br>" +
                                   "<b>Status:</b> " + report.status;
                marker.bindPopup(popupContent);
            }
        });
    </script>

    <div class="text-center mt-3">
        <a href="/" class="btn btn-secondary">Back to Home</a>
    </div>

</body>
</html>
