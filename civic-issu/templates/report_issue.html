<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Report Civic Issue</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- Bootstrap CSS  -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  
  <style>
    #map {
      height: 400px;
      width: 100%;
      margin-top: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
    }
  </style>
</head>
<body class="container mt-4">

  <h2 class="text-center">Report a Civic Issue</h2>
  
  <form method="POST" enctype="multipart/form-data" class="mt-3">
    <div class="mb-3">
      <label class="form-label">Title</label>
      <input type="text" name="title" class="form-control" required>
    </div>

    <div class="mb-3">
      <label class="form-label">Description</label>
      <textarea name="description" class="form-control"></textarea>
    </div>

    <!-- <div class="mb-3">
      <label class="form-label">Category</label>
      <input type="text" name="category" class="form-control">
    </div> -->
    <div class="mb-3">
  <label for="category" class="form-label">Category</label>
  <select name="category" id="category" class="form-control">
    <option value="">-- Select a category --</option>
    <option value="road">Road Issues</option>
    <option value="garbage">Garbage</option>
    <option value="streetlight">Streetlight Problems</option>
    <option value="water">Water Supply</option>
    <option value="noise">Noise Complaint</option>
    <option value="pollution">Pollution</option>
    <option value="drainage">Drainage Problem</option>
    <option value="other">Other</option>
  </select>
</div>


    <div class="mb-3">
      <label class="form-label">Address (optional)</label>
      <input type="text" name="location" class="form-control">
    </div>

     <!-- Hidden fields for coordinates  -->
    <input type="hidden" id="latitude" name="latitude">
    <input type="hidden" id="longitude" name="longitude">

    <p><b>Select Issue Location on Map:</b> (Click anywhere to drop a marker)</p>
    <div id="map"></div>

    <!-- Locate Me Button -->
    <div class="text-center mt-3">
      <button type="button" id="locateBtn" class="btn btn-success">📍 Use My Current Location</button>
    </div>

    <div class="mb-3 mt-3">
      <label class="form-label">Upload Image</label>
      <input type="file" name="image" class="form-control">
    </div>

    <button type="submit" class="btn btn-primary">Submit Report</button>
  </form>

   <!-- Leaflet JS  -->
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script>
    // Initialize map (Default: India view)
    var map = L.map('map').setView([20.5937, 78.9629], 5);

    // Add OpenStreetMap tiles
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    var marker;

    // On map click, drop marker and save lat/lng
    map.on('click', function(e) {
      setMarker(e.latlng.lat, e.latlng.lng);
    });

    // Function to drop marker & update hidden fields
    function setMarker(lat, lng) {
      if (marker) {
        map.removeLayer(marker);
      }
      marker = L.marker([lat, lng]).addTo(map);
      marker.bindPopup("Selected Location").openPopup();
      document.getElementById('latitude').value = lat;
      document.getElementById('longitude').value = lng;
    }

    // Handle Locate Me button
    document.getElementById('locateBtn').addEventListener('click', function() {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(function(position) {
          var lat = position.coords.latitude;
          var lng = position.coords.longitude;
          map.setView([lat, lng], 15); // Zoom in to user location
          setMarker(lat, lng);
        }, function(error) {
          alert("Error getting location: " + error.message);
        });
      } else {
        alert("Geolocation is not supported by your browser.");
      }
    });
  </script>

  <div class="text-center mt-3">
    <a href="/" class="btn btn-secondary">Back to Home</a>
  </div>

</body>
</html>
